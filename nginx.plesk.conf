# À coller dans Plesk > dcrm.dcb-technologies.fr > Apache & nginx > Directives nginx supplémentaires (HTTPS)
# Pas besoin de proxy /api/ — Express sert à la fois l'API et les fichiers React

# Cache agressif pour les assets Vite (nom avec hash = safe)
location ~* \.(js|css|woff2?|png|jpg|jpeg|gif|ico|svg)$ {
    expires 1y;
    add_header Cache-Control "public, immutable";
}
