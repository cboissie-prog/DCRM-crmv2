# À coller dans Plesk > dcrm.dcb-technologies.fr > Apache & nginx > Directives nginx supplémentaires (HTTPS)

# Proxy /api/* vers le serveur Node.js
location /api/ {
    proxy_pass http://127.0.0.1:3001;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection 'upgrade';
    proxy_cache_bypass $http_upgrade;
    proxy_read_timeout 60s;
    proxy_connect_timeout 10s;
}

# Servir l'app React (SPA) — toutes les routes redirigent vers index.html
location / {
    root /var/www/vhosts/dcrm.dcb-technologies.fr/httpdocs;
    try_files $uri $uri/ /index.html;

    # Cache agressif pour les assets buildés (hash dans le nom)
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2?)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
